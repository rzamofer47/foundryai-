<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VERA NOIR — Fashion Boutique Hamilton</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito+Sans:wght@200;300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#FAFAF8;--off:#F4F2EE;--warm:#EDE8E0;
  --black:#0A0908;--dark:#111009;--card:#181614;
  --sand:#C8B89A;--sand2:#DDD0BC;--sand3:#EEE5D6;
  --ink:#2A2520;--muted:#7A7068;--border:rgba(200,184,154,0.18)
}
html{scroll-behavior:smooth}
body{font-family:'Nunito Sans',sans-serif;background:var(--white);color:var(--black);overflow-x:hidden}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(250,250,248,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(200,184,154,0.2)}
.nav-logo{text-decoration:none}
.nav-logo-name{font-family:'Libre Baskerville',serif;font-size:1.3rem;font-weight:700;letter-spacing:.08em;color:var(--black)}
.nav-logo-sub{font-size:.5rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--sand);display:block;margin-top:1px}
.nav-center{display:flex;gap:1.5rem;align-items:center}
.nav-demo-link{font-size:.55rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:rgba(10,9,8,.25);text-decoration:none;transition:color .2s}
.nav-demo-link:hover{color:var(--sand)}
.nav-right{display:flex;align-items:center;gap:2rem}
.nav-right a{font-size:.58rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
.nav-right a:hover{color:var(--black)}
.nav-book{background:var(--black)!important;color:var(--white)!important;padding:.45rem 1.2rem!important;font-weight:600!important;transition:background .2s!important}
.nav-book:hover{background:var(--ink)!important}

/* HERO — magazine cover style */
.hero{min-height:100vh;display:grid;grid-template-columns:58% 42%;padding-top:66px;position:relative}
.hero-left{background:var(--black);display:flex;flex-direction:column;justify-content:space-between;padding:4rem 4rem 4rem 3.5rem;position:relative;overflow:hidden}
.hero-bg-word{position:absolute;font-family:'Libre Baskerville',serif;font-size:24rem;font-weight:700;font-style:italic;color:rgba(200,184,154,0.04);line-height:1;bottom:-3rem;left:-1rem;pointer-events:none;white-space:nowrap}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:2}
.hero-season{font-size:.55rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--sand);display:flex;align-items:center;gap:.7rem}
.hero-season::before{content:'';width:2rem;height:1px;background:var(--sand)}
.hero-issue{font-size:.55rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:rgba(250,250,248,.2)}
.hero-main{position:relative;z-index:2}
.hero h1{font-family:'Libre Baskerville',serif;font-size:clamp(3.5rem,6.5vw,7rem);font-weight:700;line-height:.9;letter-spacing:-.01em;color:var(--white);margin-bottom:1.5rem}
.hero h1 em{font-style:italic;font-weight:400;color:var(--sand2);display:block}
.hero-sub{font-size:.8rem;font-weight:200;color:rgba(250,250,248,.45);line-height:1.85;max-width:300px;margin-bottom:2.5rem;letter-spacing:.03em}
.hero-btns{display:flex;gap:.8rem;flex-wrap:wrap}
.btn-sand{display:inline-flex;align-items:center;gap:.5rem;background:var(--sand);color:var(--black);padding:.85rem 2rem;font-size:.62rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;font-family:'Nunito Sans',sans-serif;transition:background .2s,transform .15s;border:none;cursor:pointer}
.btn-sand:hover{background:var(--sand2);transform:translateY(-2px)}
.btn-white{display:inline-flex;align-items:center;gap:.5rem;background:transparent;color:var(--white);padding:.85rem 2rem;font-size:.62rem;font-weight:300;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;border:1px solid rgba(250,250,248,.15);font-family:'Nunito Sans',sans-serif;transition:border-color .2s;cursor:pointer}
.btn-white:hover{border-color:var(--sand);color:var(--sand)}
.hero-tags{display:flex;gap:.6rem;flex-wrap:wrap;position:relative;z-index:2}
.htag{font-size:.52rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:rgba(250,250,248,.3);border:1px solid rgba(250,250,248,.1);padding:.25rem .75rem}

.hero-right{background:var(--warm);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.hero-right::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 40% 50%,rgba(200,184,154,0.2) 0%,transparent 60%)}
.hero-visual-wrap{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:1.5rem}
.hero-model-glow{position:relative;width:clamp(300px,34vw,500px);aspect-ratio:3/4;border-radius:8px;overflow:hidden;box-shadow:0 0 0 1px rgba(255,248,221,.95),0 0 28px rgba(255,255,255,.9),0 0 64px rgba(255,230,120,.8),0 0 120px rgba(255,214,92,.62),0 26px 56px rgba(10,9,8,.22);animation:sway 6s ease-in-out infinite}
.hero-model-img{object-fit:cover;object-position:center 36%}
@keyframes sway{0%,100%{transform:rotate(-2deg) translateY(0)}50%{transform:rotate(2deg) translateY(-10px)}}
.hero-tag-float{background:var(--black);color:var(--sand);font-size:.55rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;padding:.5rem 1.2rem;display:inline-block}
.price-float{position:absolute;background:var(--white);padding:.8rem 1.2rem;box-shadow:0 8px 30px rgba(10,9,8,.1)}
.price-float-1{top:15%;left:5%}
.price-float-2{bottom:20%;right:5%}
.pf-label{font-size:.52rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:.2rem}
.pf-val{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;color:var(--black)}

.ticker{background:var(--black);padding:.75rem 0;overflow:hidden;white-space:nowrap}
.ticker-inner{display:inline-flex;gap:3rem;animation:scroll 25s linear infinite}
@keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker span{font-size:.6rem;font-weight:200;letter-spacing:.28em;text-transform:uppercase;color:rgba(250,250,248,.4)}
.t-dot{color:var(--sand)!important}

.collection{padding:7rem 3rem}
.coll-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:4rem;gap:2rem;flex-wrap:wrap}
.sec-tag{font-size:.52rem;font-weight:600;letter-spacing:.28em;text-transform:uppercase;color:var(--sand);margin-bottom:.8rem;display:flex;align-items:center;gap:.7rem}
.sec-tag::before{content:'';width:1.5rem;height:1px;background:var(--sand)}
.sec-title{font-family:'Libre Baskerville',serif;font-size:clamp(2rem,3.5vw,3.2rem);font-weight:700;line-height:1.05;color:var(--black)}
.sec-title em{font-style:italic;font-weight:400;color:var(--sand)}
.view-all{font-size:.55rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;border-bottom:1px solid rgba(122,112,104,.3);padding-bottom:.2rem;transition:color .2s,border-color .2s}
.view-all:hover{color:var(--black);border-color:var(--black)}
.prod-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:2px;background:rgba(200,184,154,.12)}
.prod{background:var(--white);cursor:pointer;position:relative;overflow:hidden}
.prod:hover .prod-img{transform:scale(1.03)}
.prod-img{aspect-ratio:3/4;background:linear-gradient(165deg,var(--warm) 0%,#e6e1d8 100%);display:flex;flex-direction:column;transition:transform .4s ease;overflow:hidden;position:relative;padding:clamp(12px,2.75vw,20px)}
.prod-photo-slot{position:relative;flex:1 1 auto;width:100%;min-height:0;border-radius:6px;overflow:hidden;background:var(--sand3);box-shadow:0 0 0 1px rgba(255,209,118,.42),0 0 26px rgba(255,214,112,.52),0 0 62px rgba(255,239,188,.38),0 12px 32px rgba(10,9,8,.08)}
.prod:hover .prod-photo-slot{box-shadow:0 0 0 1px rgba(255,220,150,.52),0 0 34px rgba(255,214,112,.62),0 0 74px rgba(255,239,188,.46),0 14px 36px rgba(10,9,8,.11)}
.prod-photo-img{object-fit:cover;object-position:center}
.prod-badge{position:absolute;top:clamp(.75rem,.9rem,1.1rem);left:clamp(.75rem,.9rem,1.1rem);z-index:2;font-size:.5rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;padding:.25rem .7rem}
.prod-badge.new{background:var(--black);color:var(--white)}
.prod-badge.sale{background:var(--sand);color:var(--black)}
.prod-info{padding:1.2rem 1.5rem}
.prod-name{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:400;color:var(--black);margin-bottom:.2rem}
.prod-mat{font-size:.6rem;font-weight:300;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.prod-price{font-size:.82rem;font-weight:600;color:var(--black);display:flex;align-items:center;gap:.6rem}
.prod-price-old{color:var(--muted);font-weight:300;text-decoration:line-through;font-size:.75rem}

.about{display:grid;grid-template-columns:1fr 1fr}
.about-left{background:var(--off);padding:6rem 4rem;display:flex;flex-direction:column;justify-content:center}
.about-desc{font-size:.82rem;font-weight:300;color:var(--muted);line-height:1.9;margin:1.5rem 0 2.5rem;max-width:30rem;letter-spacing:.02em}
.about-stats{display:flex;gap:3rem}
.astat-n{font-family:'Libre Baskerville',serif;font-size:2.8rem;font-weight:700;color:var(--black);line-height:1}
.astat-l{font-size:.52rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-top:.3rem}
.about-right{background:var(--black);padding:6rem 4rem;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
.about-right::before{content:'';position:absolute;bottom:-80px;right:-80px;width:350px;height:350px;border-radius:50%;background:rgba(200,184,154,.04)}
.hours-title{font-family:'Libre Baskerville',serif;font-size:1.6rem;font-weight:400;color:var(--white);margin-bottom:.3rem;position:relative;z-index:2}
.hours-sub{font-size:.52rem;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:2rem;position:relative;z-index:2}
.h-row{display:flex;justify-content:space-between;padding:.65rem 0;border-bottom:1px solid rgba(250,250,248,.05);font-size:.8rem;position:relative;z-index:2}
.h-row:last-of-type{border:none}
.h-day{color:rgba(250,250,248,.38);font-weight:200;letter-spacing:.04em}
.h-time{color:var(--white);font-weight:400}
.h-time.closed{color:var(--muted)}
.visit-btn{margin-top:2rem;display:block;width:100%;text-align:center;padding:.9rem;background:var(--sand);color:var(--black);font-size:.6rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;text-decoration:none;font-family:'Nunito Sans',sans-serif;transition:background .2s;border:none;cursor:pointer;position:relative;z-index:2}
.visit-btn:hover{background:var(--sand2)}

.features{padding:6rem 3rem;background:var(--warm)}
.feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:rgba(200,184,154,.2);margin-top:3.5rem}
.feat{background:var(--off);padding:2.5rem 2rem;transition:background .2s}
.feat:hover{background:var(--white)}
.feat-icon{font-size:1.8rem;margin-bottom:1.2rem;display:block}
.feat-name{font-family:'Libre Baskerville',serif;font-size:1rem;font-weight:400;color:var(--black);margin-bottom:.5rem}
.feat-desc{font-size:.75rem;font-weight:300;color:var(--muted);line-height:1.7;letter-spacing:.02em}

footer{background:var(--black);padding:3rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1.5rem}
.f-logo{font-family:'Libre Baskerville',serif;font-size:1.1rem;font-weight:700;color:var(--white);text-decoration:none}
.f-info{font-size:.68rem;font-weight:300;color:var(--muted);line-height:1.85;letter-spacing:.02em}
.f-info a{color:var(--sand);text-decoration:none}
.f-credit{font-size:.6rem;color:rgba(122,112,104,.45)}
.f-credit a{color:var(--sand);text-decoration:none;opacity:.7}

#chat-toggle{position:fixed;bottom:2rem;right:2rem;z-index:200;width:54px;height:54px;background:var(--black);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(10,9,8,.2);transition:background .2s,transform .2s}
#chat-toggle:hover{background:var(--ink);transform:scale(1.05)}
.ico{width:22px;height:22px}.ico-close{display:none}
#chat-window{position:fixed;bottom:5.5rem;right:2rem;z-index:200;width:355px;max-height:520px;background:var(--white);border:1px solid rgba(200,184,154,.2);box-shadow:0 12px 50px rgba(10,9,8,.1);display:flex;flex-direction:column;opacity:0;transform:translateY(14px) scale(.97);pointer-events:none;transition:opacity .25s,transform .25s;overflow:hidden}
#chat-window.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
.c-header{background:var(--black);padding:.9rem 1.2rem;display:flex;align-items:center;gap:.9rem}
.c-avatar{width:36px;height:36px;background:var(--sand);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.c-name{font-family:'Libre Baskerville',serif;font-size:1rem;font-style:italic;color:var(--white)}
.c-status{font-size:.6rem;color:rgba(250,250,248,.45);display:flex;align-items:center;gap:.4rem}
.sdot{width:6px;height:6px;border-radius:50%;background:#4ade80;display:inline-block}
#c-msgs{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.65rem;min-height:0;scrollbar-width:thin}
.msg{max-width:84%;padding:.62rem .95rem;font-size:.8rem;font-weight:300;line-height:1.6;letter-spacing:.02em;animation:pop .18s ease}
@keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{background:var(--off);color:var(--black);align-self:flex-start;border-bottom-left-radius:0;border:1px solid rgba(200,184,154,.2)}
.msg.user{background:var(--black);color:var(--white);align-self:flex-end;border-bottom-right-radius:0}
.msg.typing{background:var(--off);align-self:flex-start;border:1px solid rgba(200,184,154,.2);padding:.8rem 1rem}
.dots{display:flex;gap:4px;align-items:center;height:14px}
.dots span{width:5px;height:5px;border-radius:50%;background:var(--sand);animation:bop 1.2s infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes bop{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.c-quick{padding:.5rem 1rem;display:flex;gap:.4rem;flex-wrap:wrap;border-top:1px solid rgba(200,184,154,.15);background:var(--off)}
.qb{font-size:.6rem;font-weight:600;padding:.25rem .65rem;border:1px solid rgba(200,184,154,.25);background:var(--white);color:var(--muted);cursor:pointer;font-family:'Nunito Sans',sans-serif;letter-spacing:.1em;transition:background .15s,color .15s;white-space:nowrap}
.qb:hover{background:var(--warm);color:var(--black)}
.c-bar{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;border-top:1px solid rgba(200,184,154,.15)}
#c-input{flex:1;border:1px solid rgba(200,184,154,.2);background:var(--off);padding:.5rem .85rem;font-size:.8rem;font-family:'Nunito Sans',sans-serif;font-weight:300;color:var(--black);outline:none;transition:border-color .2s}
#c-input:focus{border-color:var(--sand)}
#c-input::placeholder{color:var(--muted)}
#c-send{width:34px;height:34px;background:var(--black);border:none;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .2s}
#c-send:hover{background:var(--ink)}
#c-send svg{width:13px;height:13px;fill:none;stroke:var(--white);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

@media(max-width:900px){
  nav{padding:.9rem 1.5rem}.nav-right{display:none}
  .hero{grid-template-columns:1fr}.hero-left{padding:5rem 1.5rem 3rem;min-height:80vh}.hero-right{height:90vw;max-height:700px}
  .hero-model-glow{width:min(88vw,420px)}
  .price-float{display:none}
  .collection{padding:4rem 1.5rem}.prod-grid{grid-template-columns:1fr 1fr}
  .about{grid-template-columns:1fr}.about-left,.about-right{padding:4rem 1.5rem}
  .features{padding:4rem 1.5rem}.feat-grid{grid-template-columns:1fr 1fr}
  footer{padding:2rem 1.5rem;flex-direction:column;align-items:flex-start}
  #chat-window{width:calc(100vw - 2rem);right:1rem;bottom:5rem}
  #chat-toggle{right:1rem;bottom:1rem}
}
</style>
</head>
<body>
<!-- Markup identical to React VeraNoirMarkup; script omitted in archive -->
</body>
</html>
